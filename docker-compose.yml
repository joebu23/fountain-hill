services:
  app:
    image: ghcr.io/joebu23/fountain-hill:latest
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "3003:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
